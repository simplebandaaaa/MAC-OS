name: Secure macOS Remote Access via Tailscale

on:
  workflow_dispatch:

jobs:
  secure-mac-vnc:
    runs-on: macos-latest
    timeout-minutes: 360 # GitHub max time limit

    steps:
      - name: Configure Core macOS Screen Sharing & Set Password
        run: |
          # Fallback password logic
          PASSWORD="${{ secrets.MY_RDP_PASSWORD }}"
          if [ -z "$PASSWORD" ]; then
              PASSWORD="SecurePass@2026!"
          fi

          # Password mask karna taaki logs me na dikhe
          echo "::add-mask::$PASSWORD"

          # [FIX] Default administrator 'runner' ka password change karne ka safe tarika
          echo "$PASSWORD" | sudo passwd --stdin runner || echo "runner:$PASSWORD" | sudo chpasswd

          # Screen Sharing (VNC) active karna aur usme yahi password sync karna
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd "$PASSWORD" \
            -restart -agent -privs -all

          # Auto-login default runner user ke liye set karna taaki black screen na aaye
          sudo defaults write /Library/Preferences/com.apple.loginwindow autoLoginUser "runner"
          
          # Environment save karna agle steps ke liye
          echo "MAC_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Install Tailscale on macOS
        run: |
          # Homebrew se tailscale install karna
          brew install tailscale
          # Tailscale background service start karna (sudo errors bypass karne ke liye bina sudo ke wrapper up karenge)
          sudo brew services start tailscale || true

      - name: Establish Tailscale Connection
        run: |
          # Tailscale connect karna
          sudo /opt/homebrew/bin/tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-mac-runner-$GITHUB_RUN_ID
          
          tsIP=""
          retries=0
          while [ -z "$tsIP" ] && [ $retries -lt 12 ]; do
              tsIP=$(/opt/homebrew/bin/tailscale ip -4)
              if [ -z "$tsIP" ]; then
                  sleep 5
                  ((retries++))
              fi
          done
          
          if [ -z "$tsIP" ]; then
              echo "Tailscale IP assignment failed. Exiting."
              exit 1
          fi
          
          echo "TAILSCALE_IP=$tsIP" >> $GITHUB_ENV
      
      - name: Verify VNC Accessibility
        run: |
          echo "Checking VNC port 5900..."
          nc -zv 127.0.0.1 5900
          if [ $? -ne 0 ]; then
              echo "VNC service not active"
              exit 1
          fi
          echo "VNC is ready!"

      - name: Maintain Connection
        run: |
          echo -e "\n=== macOS REMOTE ACCESS INFORMATION ==="
          echo "Connection URL: vnc://$TAILSCALE_IP"
          echo "Username      : runner"
          echo "Password      : $MAC_PASSWORD"
          echo "========================================\n"
          
          while true; do
              echo "[$(date)] Keep-Alive: macOS Remote Session is active..."
              sleep 180
          done
