name: Secure macOS VNC via Tailscale

on:
  workflow_dispatch:

jobs:
  secure-mac-vnc:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Install Tailscale Standalone
        run: |
          echo "=== Downloading Tailscale Stable Package ==="
          curl -L -o Tailscale.pkg "https://pkgs.tailscale.com/stable/Tailscale-1.68.0-macos.pkg"
          
          echo "=== Installing Tailscale silently ==="
          sudo installer -pkg Tailscale.pkg -target /

      - name: Configure macOS Screen Sharing (Bypass Account Password)
        run: |
          PASSWORD="${{ secrets.MY_RDP_PASSWORD }}"
          if [ -z "$PASSWORD" ]; then
              PASSWORD="SecurePass@2026!"
          fi
          echo "::add-mask::$PASSWORD"

          # Native Screen Sharing plist load karna
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist || true
          
          # Direct global VNC password set karna
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd "$PASSWORD" \
            -restart -agent -privs -all

          echo "MAC_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Establish Tailscale Connection
        run: |
          # [FIX] Tailscale ki background service (daemon) ko pehle system me force start karna
          sudo launchctl load -w /Library/LaunchDaemons/com.tailscale.tailscaled.plist || true
          sudo /Applications/Tailscale.app/Contents/MacOS/tailscaled > /dev/null 2>&1 &
          
          # Daemon ko load hone ke liye thoda time dena
          sleep 8

          # Ab Tailscale ko securely login bypass auth key ke sath connect karna
          sudo /Applications/Tailscale.app/Contents/MacOS/Tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-mac-runner-$GITHUB_RUN_ID --accept-dns=false &
          
          sleep 10
          
          tsIP=""
          retries=0
          while [ -z "$tsIP" ] && [ $retries -lt 12 ]; do
              tsIP=$(/Applications/Tailscale.app/Contents/MacOS/Tailscale ip -4 2>/dev/null) || true
              if [ -z "$tsIP" ]; then
                  sleep 5
                  ((retries++))
              fi
          done
          
          if [ -z "$tsIP" ]; then
              echo "Tailscale IP assignment failed."
              exit 1
          fi
          
          echo "TAILSCALE_IP=$tsIP" >> $GITHUB_ENV

      - name: Maintain Connection
        run: |
          echo -e "\n=== macOS REMOTE ACCESS INFORMATION ==="
          echo "Connection URL: vnc://$TAILSCALE_IP"
          echo "VNC Password  : $MAC_PASSWORD"
          echo "========================================\n"
          
          while true; do
              echo "[$(date)] Keep-Alive: macOS Remote Session is active..."
              sleep 180
          done
