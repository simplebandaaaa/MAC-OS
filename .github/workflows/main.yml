name: Secure macOS VNC via Tailscale Official

on:
  workflow_dispatch:

jobs:
  secure-mac-vnc:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Tailscale Official GitHub Action (Yeh bina kisi permission ya tar error ke chalega)
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      # 2. Get Tailscale IP
      - name: Fetch Assigned Tailscale IP
        id: ts-ip
        run: |
          tsIP=$(tailscale ip -4)
          echo "TAILSCALE_IP=$tsIP" >> $GITHUB_ENV

      # 3. Setup macOS Screen Sharing (VNC) Password
      - name: Configure macOS Screen Sharing
        run: |
          PASSWORD="${{ secrets.MY_RDP_PASSWORD }}"
          if [ -z "$PASSWORD" ]; then
              PASSWORD="SecurePass@2026!"
          fi
          echo "::add-mask::$PASSWORD"

          # Screen Sharing Daemon initialize karna
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist || true
          
          # Custom VNC Password inject karna
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd "$PASSWORD" \
            -restart -agent -privs -all

          echo "MAC_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      # 4. Maintain Active Session
      - name: Maintain Active Connection
        run: |
          echo -e "\n=== macOS REMOTE ACCESS INFORMATION ==="
          echo "Connection URL: vnc://$TAILSCALE_IP"
          echo "Username      : (Leave Blank / Khali Chhodein)"
          echo "VNC Password  : $MAC_PASSWORD"
          echo "========================================\n"
          
          while true; do
              echo "[$(date)] Keep-Alive: macOS Remote Session is active..."
              sleep 180
          done
