name: macOS-GUI-ChromeRemoteDesktop

on:
  workflow_dispatch:
    inputs:
      crd_auth_code:
        description: 'Paste the FULL command from CRD'
        required: true

jobs:
  gui-access:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - name: Download and Install Chrome & Chrome Remote Desktop
      run: |
        # Download official CRD DMG
        curl -L -o crd.dmg "https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg"
        
        # DMG mount karenge aur uska path save karenge
        MOUNT_DIR=$(hdiutil attach crd.dmg | grep -o '/Volumes/.*' | head -n 1)
        echo "Mounted at: $MOUNT_DIR"
        
        # System me installer script run karenge
        sudo installer -pkg "$MOUNT_DIR/Chrome Remote Desktop Host.pkg" -target /
        
        # Clean up karenge
        hdiutil detach "$MOUNT_DIR"

    - name: Configure and Start Remote Desktop
      run: |
        INPUT_CMD="${{ github.event.inputs.crd_auth_code }}"
        
        CODE=$(echo "$INPUT_CMD" | grep -oEi '(--code="[^"]+"|\-\-code=[^ ]+)' | sed 's/--code=//' | tr -d '"')
        REDIRECT=$(echo "$INPUT_CMD" | grep -oEi '(--redirect-url="[^"]+"|\-\-redirect-url=[^ ]+)' | sed 's/--redirect-url=//' | tr -d '"')
        NAME="GitHub-Actions-Mac"
        
        if [ -z "$REDIRECT" ]; then REDIRECT="https://remotedesktop.google.com/_/oauthredirect"; fi
        
        # Path selection with fail-safe logic
        PATH1="/Applications/Chrome Remote Desktop Host.app/Contents/MacOS/remotedesktop_host"
        PATH2="/Library/PrivilegedHelperTools/com.google.remote_desktop.me2me_host.app/Contents/MacOS/remotedesktop_host"
        
        if [ -f "$PATH1" ]; then
          CRD_PATH="$PATH1"
        else
          CRD_PATH="$PATH2"
        fi
        
        echo "Executing using binary at: $CRD_PATH"
        
        sudo "$CRD_PATH" \
          --host_id="" \
          --code="$CODE" \
          --redirect_url="$REDIRECT" \
          --name="$NAME" \
          --pin="123456"

        echo "=========================================="
        echo "Chrome Remote Desktop Status: STARTED"
        echo "PIN set to: 123456"
        echo "=========================================="

    - name: Keep Alive Session
      run: |
        for i in {1..50}; do
          echo "[$(date)] Remote Desktop Service is active..."
          sleep 60
        done
