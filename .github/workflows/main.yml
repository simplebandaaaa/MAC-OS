name: Secure macOS Remote Access via Tailscale

on:
  workflow_dispatch:

jobs:
  secure-mac-vnc:
    runs-on: macos-latest
    timeout-minutes: 360 # GitHub macOS runners standard account par max 360 mins chalte hain

    steps:
      - name: Configure Core macOS Screen Sharing (VNC)
        run: |
          # Screen Sharing / VNC service ko enable karna
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          
          # VNC Access ke liye port 5900 par firewall settings settings open karna (agar active ho)
          # Note: macOS runners par default firewall aksar off hoti hai, par security layers allow karna behtar hai.

      - name: Create Remote User with Custom Password
        run: |
          $password = "${{ secrets.MY_RDP_PASSWORD }}"
          if ([string]::IsNullOrEmpty($password)) {
              $password = "SecurePass@2026!"
          }

          # GitHub logs me password ko mask karne ke liye
          echo "::add-mask::$password"

          # macOS me 'macuser' naam ka naya admin user create karna
          # GitHub runner par default user 'runner' hota hai, hum ussi ka password reset ya naya user bana sakte hain.
          # Naya user banane ke bajay 'runner' ka password set karna sabse safe aur working tarika hai:
          sudo dscl . -passwd /Users/runner "$password"
          
          # VNC (Screen Sharing) ke liye password configure karna
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd "$password" \
            -restart -agent -privs -all

          echo "MAC_PASSWORD=$password" >> $GITHUB_ENV

      - name: Install Tailscale on macOS
        run: |
          # macOS par Homebrew ke zariye Tailscale asaani se install ho jata hai
          brew install tailscale
          # Tailscale background service ko start karna
          sudo brew services start tailscale

      - name: Establish Tailscale Connection
        run: |
          # Tailscale ko up karna authentication key ke sath
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-mac-runner-$GITHUB_RUN_ID
          
          tsIP=""
          retries=0
          while [ -z "$tsIP" ] && [ $retries -lt 12 ]; do
              tsIP=$(tailscale ip -4)
              if [ -z "$tsIP" ]; then
                  sleep 5
                  ((retries++))
              fi
          done
          
          if [ -z "$tsIP" ]; then
              echo "Tailscale IP assignment failed. Exiting."
              exit 1
          fi
          
          echo "TAILSCALE_IP=$tsIP" >> $GITHUB_ENV
      
      - name: Verify VNC Accessibility
        run: |
          echo "Checking if VNC port 5900 is listening locally..."
          nc -zv 127.0.0.1 5900
          if [ $? -ne 0 ]; then
              echo "VNC service is not running on port 5900"
              exit 1
          fi
          echo "VNC Connectivity Successful!"

      - name: Maintain Connection
        run: |
          echo -e "\n=== macOS REMOTE ACCESS INFORMATION ==="
          echo "Connection URL: vnc://$TAILSCALE_IP"
          echo "Username      : runner"
          echo "Password      : $MAC_PASSWORD"
          echo "========================================\n"
          
          while true; do
              echo "[$(date)] Keep-Alive: macOS Remote Session is active..."
              sleep 180
          done
