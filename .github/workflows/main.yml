name: Fast macOS TigerVNC Access via Tailscale

on:
  workflow_dispatch:

jobs:
  secure-mac-vnc:
    runs-on: macos-latest
    timeout-minutes: 60 # Fast version hai, lambe waqt ki zaroorat nahi padegi

    steps:
      - name: Install Tailscale & TigerVNC via Direct Binaries (No Brew Waiting)
        run: |
          # 1. Tailscale install aur start karna standalone binary se
          curl -fsSL https://pkgs.tailscale.com/stable/tailscale_latest_macOS.zip -o tailscale.zip
          unzip -q tailscale.zip
          sudo cp -R Tailscale.app /Applications/
          # Path configure karna taaki commands chalein
          sudo ln -s /Applications/Tailscale.app/Contents/MacOS/Tailscale /usr/local/bin/tailscale || true
          
          # 2. TigerVNC Standalone Binary Download aur Extract karna
          # TigerVNC ka vncpasswd aur vncserver extract karna
          brew install tigervnc --formula || true # Formula mode fast hota hai binary/cask ke mukable, ya fir direct launch

      - name: Configure TigerVNC Password
        run: |
          PASSWORD="${{ secrets.MY_RDP_PASSWORD }}"
          if [ -z "$PASSWORD" ]; then
              PASSWORD="SecurePass@2026!"
          fi
          echo "::add-mask::$PASSWORD"

          mkdir -p ~/.vnc
          echo "$PASSWORD" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          echo "MAC_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Start TigerVNC Server
        run: |
          vncserver :1 -geometry 1280x720 -localhost no -rfbauth ~/.vnc/passwd

      - name: Establish Tailscale Connection
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-mac-runner-$GITHUB_RUN_ID
          
          tsIP=""
          retries=0
          while [ -z "$tsIP" ] && [ $retries -lt 12 ]; do
              tsIP=$(tailscale ip -4)
              if [ -z "$tsIP" ]; then
                  sleep 5
                  ((retries++))
              fi
          done
          
          if [ -z "$tsIP" ]; then
              echo "Tailscale IP assignment failed. Exiting."
              exit 1
          fi
          
          echo "TAILSCALE_IP=$tsIP" >> $GITHUB_ENV

      - name: Maintain Connection
        run: |
          echo -e "\n=== macOS REMOTE ACCESS INFORMATION ==="
          echo "Connection URL: $TAILSCALE_IP:5901"
          echo "VNC Password  : $MAC_PASSWORD"
          echo "========================================\n"
          
          while true; do
              echo "[$(date)] Keep-Alive: macOS Remote Session is active..."
              sleep 180
          done
