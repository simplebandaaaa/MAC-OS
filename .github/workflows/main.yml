name: Secure macOS TigerVNC Access via Tailscale

on:
  workflow_dispatch:

jobs:
  secure-mac-vnc:
    runs-on: macos-latest
    timeout-minutes: 360 # GitHub macOS runners standard account par max 6 hours chalte hain

    steps:
      - name: Install TigerVNC and Tailscale
        run: |
          # Install TigerVNC server and Tailscale via Homebrew
          brew install tigervnc tailscale
          
          # Start Tailscale background daemon
          sudo brew services start tailscale || true

      - name: Configure TigerVNC Password
        run: |
          PASSWORD="${{ secrets.MY_RDP_PASSWORD }}"
          if [ -z "$PASSWORD" ]; then
              PASSWORD="SecurePass@2026!"
          fi
          echo "::add-mask::$PASSWORD"

          # Create the native .vnc directory
          mkdir -p ~/.vnc

          # [FIXED] TigerVNC password file me single-line me safe input bhejna
          echo "$PASSWORD" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          echo "MAC_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Start TigerVNC Server
        run: |
          # Start TigerVNC server on port 5901 (:1) with custom resolution
          vncserver :1 -geometry 1280x720 -localhost no -rfbauth ~/.vnc/passwd

      - name: Establish Tailscale Connection
        run: |
          sudo /opt/homebrew/bin/tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-mac-runner-$GITHUB_RUN_ID
          
          tsIP=""
          retries=0
          while [ -z "$tsIP" ] && [ $retries -lt 12 ]; do
              tsIP=$(/opt/homebrew/bin/tailscale ip -4)
              if [ -z "$tsIP" ]; then
                  sleep 5
                  ((retries++))
              fi
          done
          
          if [ -z "$tsIP" ]; then
              echo "Tailscale IP assignment failed. Exiting."
              exit 1
          fi
          
          echo "TAILSCALE_IP=$tsIP" >> $GITHUB_ENV
      
      - name: Verify VNC Accessibility
        run: |
          echo "Checking TigerVNC port 5901..."
          nc -zv 127.0.0.1 5901

      - name: Maintain Connection
        run: |
          echo -e "\n=== macOS REMOTE ACCESS INFORMATION ==="
          echo "Connection URL: $TAILSCALE_IP:5901"
          echo "VNC Password  : $MAC_PASSWORD"
          echo "========================================\n"
          
          while true; do
              echo "[$(date)] Keep-Alive: macOS Remote Session is active..."
              sleep 180
          done
