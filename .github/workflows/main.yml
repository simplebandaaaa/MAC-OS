name: Secure macOS Remote Access via Tailscale

on:
  workflow_dispatch:

jobs:
  secure-mac-vnc:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Configure Core macOS Screen Sharing & Force VNC Password
        run: |
          PASSWORD="${{ secrets.MY_RDP_PASSWORD }}"
          if [ -z "$PASSWORD" ]; then
              PASSWORD="SecurePass@2026!"
          fi

          echo "::add-mask::$PASSWORD"

          # 1. Screen Sharing service load karna
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist || true

          # 2. Complete legacy VNC password configuration overwrite karna
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd "$PASSWORD" \
            -restart -agent -privs -all

          # 3. Direct VNC setting ko default preference files me write karna (for bypass)
          sudo defaults write /Library/Preferences/com.apple.VNCSettings.txt Password "$PASSWORD"
          
          # Environment save karna
          echo "MAC_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Install Tailscale on macOS
        run: |
          brew install tailscale
          sudo brew services start tailscale || true

      - name: Establish Tailscale Connection
        run: |
          sudo /opt/homebrew/bin/tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-mac-runner-$GITHUB_RUN_ID
          
          tsIP=""
          retries=0
          while [ -z "$tsIP" ] && [ $retries -lt 12 ]; do
              tsIP=$(/opt/homebrew/bin/tailscale ip -4)
              if [ -z "$tsIP" ]; then
                  sleep 5
                  ((retries++))
              fi
          done
          
          if [ -z "$tsIP" ]; then
              echo "Tailscale IP assignment failed. Exiting."
              exit 1
          fi
          
          echo "TAILSCALE_IP=$tsIP" >> $GITHUB_ENV
      
      - name: Verify VNC Accessibility
        run: |
          echo "Checking VNC port 5900..."
          nc -zv 127.0.0.1 5900
          
      - name: Maintain Connection
        run: |
          echo -e "\n=== macOS REMOTE ACCESS INFORMATION ==="
          echo "Connection URL: vnc://$TAILSCALE_IP"
          echo "VNC Password  : $MAC_PASSWORD"
          echo "========================================\n"
          
          while true; do
              echo "[$(date)] Keep-Alive: macOS Remote Session is active..."
              sleep 180
          done
