name: macOS-GUI-RustDesk

on:
  workflow_dispatch:

jobs:
  gui-access:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Install RustDesk
        run: |
          brew install --cask rustdesk

      - name: Start RustDesk & Get Credentials
        run: |
          # 'open -a' ki jagah directly binary path se background me start karenge
          /Applications/RustDesk.app/Contents/MacOS/RustDesk --service &
          sleep 10
          
          # Custom password set karna bina sudo issue ke
          /Applications/RustDesk.app/Contents/MacOS/RustDesk --password "SecureGUI2026"
          
          echo "=========================================="
          echo "RustDesk Password Set To: SecureGUI2026"
          echo "Aapko apne RustDesk app me is Runner ki ID daalni hogi."
          echo "=========================================="

      - name: Display RustDesk ID and Keep Alive
        run: |
          # Loop jo ID read karne ki koshish karega aur session active rakhega
          for i in {1..50}; do
            # RustDesk ki native command se direct ID print karwana
            /Applications/RustDesk.app/Contents/MacOS/RustDesk --get-id || true
            sleep 30
          done
