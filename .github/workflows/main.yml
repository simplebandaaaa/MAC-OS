name: macOS-GUI-ChromeRemoteDesktop

on:
  workflow_dispatch:
    inputs:
      crd_auth_code:
        description: 'Paste the FULL command from CRD (DISPLAY=... or /Applications/...)'
        required: true

jobs:
  gui-access:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - name: Install Chrome and Chrome Remote Desktop
      run: |
        export HOMEBREW_NO_AUTO_UPDATE=1
        brew install --cask google-chrome --force
        NONINTERACTIVE=1 brew install --cask chrome-remote-desktop-host

    - name: Configure and Start Remote Desktop
      run: |
        INPUT_CMD="${{ github.event.inputs.crd_auth_code }}"
        
        # Code aur Redirect URL nikalna
        CODE=$(echo "$INPUT_CMD" | grep -oEi '(--code="[^"]+"|\-\-code=[^ ]+)' | sed 's/--code=//' | tr -d '"')
        REDIRECT=$(echo "$INPUT_CMD" | grep -oEi '(--redirect-url="[^"]+"|\-\-redirect-url=[^ ]+)' | sed 's/--redirect-url=//' | tr -d '"')
        NAME="GitHub-Actions-Mac"
        
        if [ -z "$REDIRECT" ]; then REDIRECT="https://remotedesktop.google.com/_/oauthredirect"; fi
        
        echo "Extracted Code: $CODE"
        
        # macOS par CRD dhoondhne ke alag alag paths ko test karna
        CRD_PATH=""
        PATHS=(
          "/Library/PrivilegedHelperTools/com.google.remote_desktop.me2me_host.app/Contents/MacOS/remotedesktop_host"
          "/Applications/Chrome Remote Desktop Host.app/Contents/MacOS/remotedesktop_host"
          "/Library/CoreMediaIO/Plug-Ins/DAL/" # Backup check
        )
        
        for p in "${PATHS[@]}"; do
          if [ -f "$p" ]; then
            CRD_PATH="$p"
            break
          fi
        done
        
        # Agar path na mile, toh system me search maarna
        if [ -z "$CRD_PATH" ]; then
          CRD_PATH=$(sudo find / -name "remotedesktop_host" -type f 2>/dev/null | head -n 1)
        fi
        
        echo "Using CRD Binary Path: $CRD_PATH"
        
        # Host ko register aur start karna
        sudo "$CRD_PATH" \
          --host_id="" \
          --code="$CODE" \
          --redirect_url="$REDIRECT" \
          --name="$NAME" \
          --pin="123456"

        echo "=========================================="
        echo "Chrome Remote Desktop Status: STARTED"
        echo "PIN set to: 123456"
        echo "=========================================="

    - name: Keep Alive Session
      run: |
        for i in {1..50}; do
          echo "[$(date)] Remote Desktop Service is active..."
          sleep 60
        done
