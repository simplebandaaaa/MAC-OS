name: macOS-GUI-RustDesk

on:
  workflow_dispatch:

jobs:
  gui-access:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Install RustDesk
        run: |
          brew install --cask rustdesk

      - name: Start RustDesk & Get Credentials
        run: |
          # RustDesk ko background me start karna
          open -a RustDesk
          sleep 10
          
          # RustDesk ki ID aur Password nikalna logs se ya config se
          # Note: macOS sandbox me kabhi-kabhi automatic id nahi milti, 
          # Isliye hum apna custom password set kar dete hain.
          sudo rustdesk --password "SecureGUI2026"
          
          echo "=========================================="
          echo "RustDesk Password Set To: SecureGUI2026"
          echo "Aapko apne RustDesk app me is Runner ki ID daalni hogi."
          echo "ID check karne ke liye niche live system status dekhein."
          echo "=========================================="

      - name: Display RustDesk ID and Keep Alive
        run: |
          # Loop jo ID read karne ki koshish karega aur session active rakhega
          for i in {1..50}; do
            if [ -f "$HOME/Library/Preferences/com.carriez.RustDesk/RustDesk.toml" ]; then
               cat "$HOME/Library/Preferences/com.carriez.RustDesk/RustDesk.toml" | grep id || true
            fi
            sleep 30
          done
