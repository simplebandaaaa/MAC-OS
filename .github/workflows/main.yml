- name: Create Remote User with Custom Password
        run: |
          # Password fallback logic
          PASSWORD="${{ secrets.MY_RDP_PASSWORD }}"
          if [ -z "$PASSWORD" ]; then
              PASSWORD="SecurePass@2026!"
          fi

          echo "::add-mask::$PASSWORD"

          # 1. Ek free Unique ID (UID) dhoondna naye user ke liye (macOS me unique ID zaroori hai)
          NEXT_UID=$(dscl . -list /Users UniqueID | awk '{print $2}' | sort -n | tail -n 1)
          NEW_UID=$((NEXT_UID + 1))

          # 2. 'vncuser' naam ka naya account create karna
          sudo dscl . -create /Users/vncuser
          sudo dscl . -create /Users/vncuser UserShell /bin/zsh
          sudo dscl . -create /Users/vncuser RealName "Remote User"
          sudo dscl . -create /Users/vncuser UniqueID "$NEW_UID"
          sudo dscl . -create /Users/vncuser PrimaryGroupID 20
          sudo dscl . -create /Users/vncuser NFSHomeDirectory /Users/vncuser
          
          # 3. Naye user ka password set karna (Ye bina kisi purane password ke chalega)
          sudo dscl . -passwd /Users/vncuser "$PASSWORD"
          
          # 4. Naye user ko Admin (sudoers) group me add karna
          sudo dscl . -append /Groups/admin GroupMembership vncuser

          # VNC (Screen Sharing) ko naye user ke sath configure karna
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd "$PASSWORD" \
            -restart -agent -privs -all

          echo "MAC_PASSWORD=$PASSWORD" >> $GITHUB_ENV
