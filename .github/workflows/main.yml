name: Secure macOS VNC via Tailscale

on:
  workflow_dispatch:

jobs:
  secure-mac-vnc:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Install Tailscale Standalone (No Brew Update Hangs)
        run: |
          echo "=== Downloading Tailscale Stable Package ==="
          curl -L -o Tailscale.pkg "https://pkgs.tailscale.com/stable/Tailscale-1.68.0-macos.pkg"
          
          echo "=== Installing Tailscale silently ==="
          sudo installer -pkg Tailscale.pkg -target /
          
          echo "=== Tailscale installation checked ==="

      - name: Configure macOS Screen Sharing & User Pass
        run: |
          PASSWORD="${{ secrets.MY_RDP_PASSWORD }}"
          if [ -z "$PASSWORD" ]; then
              PASSWORD="SecurePass@2026!"
          fi
          echo "::add-mask::$PASSWORD"

          # Native directory utility se safe override
          sudo dscl /Local/Default -passwd /Users/runner "$PASSWORD"

          # Native Screen Sharing plist launch options force activate
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist || true
          
          # Remote agent setup config update
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd "$PASSWORD" \
            -restart -agent -privs -all

          # Auto-login setup for headless server rendering
          sudo defaults write /Library/Preferences/com.apple.loginwindow autoLoginUser "runner"
          
          echo "MAC_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Establish Tailscale Connection
        run: |
          # Connect via standalone direct path background mode
          sudo /Applications/Tailscale.app/Contents/MacOS/Tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-mac-runner-$GITHUB_RUN_ID &
          
          # Wait for daemon startup
          sleep 10
          
          tsIP=""
          retries=0
          while [ -z "$tsIP" ] && [ $retries -lt 12 ]; do
              tsIP=$(/Applications/Tailscale.app/Contents/MacOS/Tailscale ip -4 2>/dev/null) || true
              if [ -z "$tsIP" ]; then
                  sleep 5
                  ((retries++))
              fi
          done
          
          if [ -z "$tsIP" ]; then
              echo "Tailscale IP assignment failed. Exiting."
              exit 1
          fi
          
          echo "TAILSCALE_IP=$tsIP" >> $GITHUB_ENV

      - name: Maintain Connection
        run: |
          echo -e "\n=== macOS REMOTE ACCESS INFORMATION ==="
          echo "Connection URL: vnc://$TAILSCALE_IP"
          echo "Username      : runner"
          echo "VNC Password  : $MAC_PASSWORD"
          echo "========================================\n"
          
          while true; do
              echo "[$(date)] Keep-Alive: macOS Remote Session is active..."
              sleep 180
          done
