name: Secure macOS VNC via Tailscale Stable

on:
  workflow_dispatch:

jobs:
  secure-mac-vnc:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Configure macOS Screen Sharing (Bypass Account Password)
        run: |
          PASSWORD="${{ secrets.MY_RDP_PASSWORD }}"
          if [ -z "$PASSWORD" ]; then
              PASSWORD="SecurePass@2026!"
          fi
          echo "::add-mask::$PASSWORD"

          # Built-in Screen Sharing active karna
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist || true
          
          # Direct global VNC password inject karna
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvncpasswd -vncpasswd "$PASSWORD" \
            -restart -agent -privs -all

          echo "MAC_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Download & Run Tailscale Static Binary (Foolproof Method)
        run: |
          echo "=== Downloading Standalone Tailscale Static Binary ==="
          # Pure independent bin folder uthana jo system se koi permission nahi mangta
          curl -L -o tailscale.tgz https://pkgs.tailscale.com/stable/tailscale_1.68.0_macOS.tgz || curl -L -o tailscale.tgz https://pkgs.tailscale.com/stable/tailscale_1.66.4_macOS.tgz
          tar -xzvf tailscale.tgz
          
          # Folder ke andar move karke binaries locate karna
          cd tailscale_* || cd tailscale-*
          
          echo "=== Starting Tailscaled Daemon inside User-Space ==="
          sudo ./tailscaled --tun=userspace-tun > /dev/null 2>&1 &
          sleep 5
          
          echo "=== Establishing Tailscale Connection ==="
          sudo ./tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-mac-runner-$GITHUB_RUN_ID --accept-dns=false &
          sleep 10
          
          tsIP=""
          retries=0
          while [ -z "$tsIP" ] && [ $retries -lt 12 ]; do
              tsIP=$(sudo ./tailscale ip -4 2>/dev/null) || true
              if [ -z "$tsIP" ]; then
                  sleep 5
                  ((retries++))
              fi
          done
          
          if [ -z "$tsIP" ]; then
              echo "Tailscale IP assignment failed."
              exit 1
          fi
          
          echo "TAILSCALE_IP=$tsIP" >> $GITHUB_ENV

      - name: Maintain Connection
        run: |
          echo -e "\n=== macOS REMOTE ACCESS INFORMATION ==="
          echo "Connection URL: vnc://$TAILSCALE_IP"
          echo "VNC Password  : $MAC_PASSWORD"
          echo "========================================\n"
          
          while true; do
              echo "[$(date)] Keep-Alive: macOS Remote Session is active..."
              sleep 180
          done
