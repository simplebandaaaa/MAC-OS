name: macOS-Remote-Access

on:
  workflow_dispatch:

jobs:
  secure-mac-access:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Configure macOS Screen Sharing (VNC)
        run: |
          # Remote Management and Screen Sharing ko configure aur activate karna
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "SecurePass@2026!" \
            -restart -agent -privs -all

      - name: Change Remote User Password
        run: |
          PASSWORD="${{ secrets.MY_RDP_PASSWORD }}"
          if [ -z "$PASSWORD" ]; then
              PASSWORD="SecurePass@2026!"
          fi
          
          # macOS native way to change password for the 'runner' user
          sudo sysadminctl -adminUser runner -adminPassword "" -resetPasswordFor runner -newPassword "$PASSWORD"
          
          echo "MAC_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Install and Start Tailscale
        run: |
          # Homebrew se Tailscale install karna
          brew install tailscale
          
          # tailscaled daemon ko background me manual start karna (CI safe method)
          sudo tailscaled --state=mem: &
          sleep 5

      - name: Establish Tailscale Connection
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-mac-runner-$GITHUB_RUN_ID
          
          TS_IP=""
          RETRIES=0
          while [ -z "$TS_IP" ] && [ $RETRIES -lt 10 ]; do
              TS_IP=$(tailscale ip -4)
              [[ -z "$TS_IP" ]] && sleep 5
              RETRIES=$((RETRIES+1))
          done
          
          if [ -z "$TS_IP" ]; then
              echo "Tailscale IP assignment failed."
              exit 1
          fi
          
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Maintain Connection & Show Details
        run: |
          echo ""
          echo "=== macOS REMOTE ACCESS ==="
          echo "VNC Address: $TAILSCALE_IP"
          echo "Username: runner"
          echo "Password: [Aapka Secret Password ya 'SecurePass@2026!']"
          echo "==========================="
          echo ""
          
          # 45 minutes loop (9 * 300s = 45 mins)
          for i in {1..9}; do
              echo "[$(date)] Session Active..."
              sleep 300
          done
