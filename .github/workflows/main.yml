name: macOS-GUI-ChromeRemoteDesktop

on:
  workflow_dispatch:
    inputs:
      crd_auth_code:
        description: 'Paste the FULL command from CRD (DISPLAY=... or /Applications/...)'
        required: true

jobs:
  gui-access:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - name: Install Chrome and Chrome Remote Desktop
      run: |
        brew install --cask google-chrome
        brew install --cask chrome-remote-desktop

    - name: Configure and Start Remote Desktop
      run: |
        # Extract the auth code, redirect URL, and name from the input command
        # This handles the case where you copy-paste the Linux command by mistake
        INPUT_CMD="${{ github.event.inputs.crd_auth_code }}"
        
        CODE=$(echo "$INPUT_CMD" | grep -oEi '(--code="[^"]+"|\-\-code=[^ ]+)' | sed 's/--code=//' | tr -d '"')
        REDIRECT=$(echo "$INPUT_CMD" | grep -oEi '(--redirect-url="[^"]+"|\-\-redirect-url=[^ ]+)' | sed 's/--redirect-url=//' | tr -d '"')
        NAME=$(echo "$INPUT_CMD" | grep -oEi '(--name="[^"]+"|\-\-name=[^ ]+)' | sed 's/--name=//' | tr -d '"')
        
        # Default name if not found
        if [ -z "$NAME" ]; then NAME="GitHub-Actions-Mac"; fi
        if [ -z "$REDIRECT" ]; then REDIRECT="https://remotedesktop.google.com/_/oauthredirect"; fi
        
        echo "Extracted Code: $CODE"
        
        # Path to the macOS Chrome Remote Desktop host service binary
        CRD_PATH="/Library/PrivilegedHelperTools/com.google.remote_desktop.me2me_host.app/Contents/MacOS/remotedesktop_host"
        
        # Run the actual macOS binary with the parameters
        sudo "$CRD_PATH" \
          --host_id="" \
          --code="$CODE" \
          --redirect_url="$REDIRECT" \
          --name="$NAME" \
          --pin="123456"

        echo "=========================================="
        echo "Chrome Remote Desktop Status: STARTED"
        echo "PIN set to: 123456"
        echo "=========================================="

    - name: Keep Alive Session
      run: |
        # Keeps the workflow alive for ~50 minutes
        for i in {1..50}; do
          echo "[$(date)] Remote Desktop Service is active..."
          sleep 60
        done
