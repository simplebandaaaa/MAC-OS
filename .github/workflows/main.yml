name: macOS-GUI-ChromeRemoteDesktop

on:
  workflow_dispatch:
    inputs:
      crd_auth_code:
        description: 'Paste the FULL command from CRD (DISPLAY=... or /Applications/...)'
        required: true

jobs:
  gui-access:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - name: Download and Install Chrome & Chrome Remote Desktop Officially
      run: |
        # Google Chrome already installed hota hai, fir bhi ensure kar lete hain
        export HOMEBREW_NO_AUTO_UPDATE=1
        brew install --cask google-chrome --force || true
        
        # CRD ka official macOS package (.pkg) direct Google ke server se download karenge
        echo "Downloading official Chrome Remote Desktop PKG..."
        curl -L -o json.dmg "https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg"
        
        # DMG ko mount karenge
        hdiutil attach json.dmg
        
        # PKG installer ko system root par silently install karenge (Bina brew ke jhanjhat ke)
        echo "Installing PKG package..."
        sudo installer -pkg "/Volumes/Chrome Remote Desktop/Chrome Remote Desktop Host.pkg" -target /
        
        # DMG unmount karenge
        hdiutil detach "/Volumes/Chrome Remote Desktop"

    - name: Configure and Start Remote Desktop
      run: |
        INPUT_CMD="${{ github.event.inputs.crd_auth_code }}"
        
        # Code aur Redirect URL nikalna
        CODE=$(echo "$INPUT_CMD" | grep -oEi '(--code="[^"]+"|\-\-code=[^ ]+)' | sed 's/--code=//' | tr -d '"')
        REDIRECT=$(echo "$INPUT_CMD" | grep -oEi '(--redirect-url="[^"]+"|\-\-redirect-url=[^ ]+)' | sed 's/--redirect-url=//' | tr -d '"')
        NAME="GitHub-Actions-Mac"
        
        if [ -z "$REDIRECT" ]; then REDIRECT="https://remotedesktop.google.com/_/oauthredirect"; fi
        
        echo "Extracted Code: $CODE"
        
        # Official PKG installation ke baad binary isi exact location par aati hai
        CRD_PATH="/Library/PrivilegedHelperTools/com.google.remote_desktop.me2me_host.app/Contents/MacOS/remotedesktop_host"
        
        # Service ko configure aur start karna
        sudo "$CRD_PATH" \
          --host_id="" \
          --code="$CODE" \
          --redirect_url="$REDIRECT" \
          --name="$NAME" \
          --pin="123456"

        echo "=========================================="
        echo "Chrome Remote Desktop Status: STARTED"
        echo "PIN set to: 123456"
        echo "=========================================="

    - name: Keep Alive Session
      run: |
        for i in {1..50}; do
          echo "[$(date)] Remote Desktop Service is active..."
          sleep 60
        done
